{% extends "base.html" %}
{% block title %}Payment Cancelled - AutoWorld{% endblock %}

{% block content %}
<style>
  .status-box { max-width:520px; margin:4rem auto; text-align:center; }
  .status-icon { width:90px; height:90px; border-radius:50%; background:linear-gradient(135deg,#dc3545,#b52a36); display:flex; align-items:center; justify-content:center; font-size:2.5rem; margin:0 auto 1.5rem; box-shadow:0 8px 24px rgba(220,53,69,.25); }
</style>

<div class="status-box">
  <div class="status-icon">❌</div>
  <h3 class="fw-bold mb-2" style="color:#1e1153;">Payment Cancelled</h3>
  <p class="text-muted mb-4">Your payment was not completed. You can try again or choose a different payment method.</p>
  <div class="d-flex gap-3 justify-content-center flex-wrap">
    <a href="{% url 'checkout' %}" class="btn rounded-pill px-4 fw-semibold"
       style="background:#1e1153; color:white;">Try Again</a>
    <a href="{% url 'home' %}" class="btn btn-outline-secondary rounded-pill px-4 fw-semibold">
      Back to Home
    </a>
  </div>
</div>
{% endblock %}
