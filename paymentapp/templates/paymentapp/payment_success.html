{% extends "base.html" %}
{% block title %}Payment Successful - AutoWorld{% endblock %}

{% block content %}
<style>
  .success-box { max-width:520px; margin:4rem auto; text-align:center; }
  .success-icon { width:90px; height:90px; border-radius:50%; background:linear-gradient(135deg,#11ba1f,#0d9e1a); display:flex; align-items:center; justify-content:center; font-size:2.5rem; margin:0 auto 1.5rem; box-shadow:0 8px 24px rgba(17,186,31,.3); }
</style>

<div class="success-box">
  <div class="success-icon">✅</div>
  <h3 class="fw-bold mb-2" style="color:#1e1153;">Payment Successful!</h3>
  <p class="text-muted mb-4">Thank you for your purchase. Your order has been received and is being processed.</p>
  <div class="d-flex gap-3 justify-content-center flex-wrap">
    <a href="{% url 'customer_booking_history' %}" class="btn rounded-pill px-4 fw-semibold"
       style="background:#1e1153; color:white;">View My Bookings</a>
    <a href="{% url 'home' %}" class="btn btn-outline-secondary rounded-pill px-4 fw-semibold">
      Back to Home
    </a>
  </div>
</div>
{% endblock %}
